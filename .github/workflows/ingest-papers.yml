name: Ingest papers

on:
  workflow_dispatch:
  schedule:
    # 08:11 KST primary (23:11 UTC). Avoid minute 0 because GitHub can delay/drop hourly cron bursts.
    - cron: "11 23 * * *"
    # 08:41 KST backup (23:41 UTC). If the primary run is dropped, this becomes the daily updater.
    - cron: "41 23 * * *"

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install poppler (PDF thumbnails)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Generate paper digest
        env:
          X_USER_ID: ${{ secrets.X_USER_ID }}
          X_USER_ACCESS_TOKEN: ${{ secrets.X_USER_ACCESS_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          # MAX_PAPERS unset = no cap. Set to a positive number to re-enable a limit.
          MAX_PAPERS: "0"
        run: node scripts/ingest-papers.js

      - name: Render paper thumbnails
        env:
          # Cap new thumbnails rendered per run so CI stays fast and arXiv is not hammered.
          THUMB_LIMIT: "120"
        run: node scripts/render-thumbnails.js

      - name: Build X feed
        env:
          # Pace requests to X's syndication endpoint to avoid 429s.
          XFEED_DELAY: "2500"
        run: node scripts/ingest-xfeed.js

      - name: Commit updated digest
        run: |
          git add papers/papers.json papers/thumbs
          if [ -f papers/twitter-feed.json ]; then
            git add papers/twitter-feed.json
          fi
          if git diff --cached --quiet; then
            echo "No digest changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update paper digest"
          git push
